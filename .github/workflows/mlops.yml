name: MLOps Pipeline

on:
  push:
    branches: [master]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
      - '.github/workflows/mlops.yml'
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 - UNIT TEST
  # Chay unit tests tren du lieu ao (khong can ket noi cloud storage).
  # Neu co bat ky test nao that bai, pipeline dung lai o day va khong tien hanh
  # huan luyen hay trien khai.
  # ---------------------------------------------------------------------------
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v


  # ---------------------------------------------------------------------------
  # BONUS 2 - MULTI-ALGORITHM EXPERIMENTS
  # Chay nhieu thuat toan trong cung mot workflow de so sanh tren DagsHub/MLflow.
  # Job nay chi tao experiment va metrics artifact; model duoc deploy van do job
  # Train/Eval/Deploy ben duoi quyet dinh.
  # ---------------------------------------------------------------------------
  bonus2_experiments:
    name: Bonus 2 - ${{ matrix.model_type }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model_type:
          - random_forest
          - gradient_boosting
          - logistic_regression

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Cloud Storage
        run: |
          python - <<'EOF'
          import json
          import os

          credentials = json.loads(os.environ["CLOUD_CREDENTIALS"])
          with open(os.environ["GITHUB_ENV"], "a") as env_file:
              env_file.write(f"AWS_ACCESS_KEY_ID={credentials['aws_access_key_id']}\n")
              env_file.write(f"AWS_SECRET_ACCESS_KEY={credentials['aws_secret_access_key']}\n")
              env_file.write("AWS_DEFAULT_REGION=us-east-1\n")
              env_file.write("AWS_REGION=us-east-1\n")
          EOF
        env:
          CLOUD_CREDENTIALS: ${{ secrets.CLOUD_CREDENTIALS }}

      - name: Pull data with DVC
        run: dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc

      - name: Select algorithm
        run: |
          python - <<'EOF'
          import os
          import yaml

          with open("params.yaml") as f:
              params = yaml.safe_load(f)
          params["model_type"] = os.environ["MODEL_TYPE"]
          with open("params.yaml", "w") as f:
              yaml.safe_dump(params, f, sort_keys=False)
          print(f"Selected model_type={params['model_type']}")
          EOF
        env:
          MODEL_TYPE: ${{ matrix.model_type }}

      - name: Train experiment
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_RUN_NAME: bonus2-${{ matrix.model_type }}
        run: python src/train.py

      - name: Save experiment metrics
        uses: actions/upload-artifact@v4
        with:
          name: bonus2-metrics-${{ matrix.model_type }}
          path: |
            outputs/metrics.json
            outputs/report.txt


  # ---------------------------------------------------------------------------
  # JOB 2 - TRAIN
  # Xac thuc cloud storage, pull du lieu bang DVC, huan luyen mo hinh, upload artifact.
  # Chi chay khi Job 1 (Unit Test) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Cloud Storage
        run: |
          python - <<'EOF'
          import json
          import os

          credentials = json.loads(os.environ["CLOUD_CREDENTIALS"])
          with open(os.environ["GITHUB_ENV"], "a") as env_file:
              env_file.write(f"AWS_ACCESS_KEY_ID={credentials['aws_access_key_id']}\n")
              env_file.write(f"AWS_SECRET_ACCESS_KEY={credentials['aws_secret_access_key']}\n")
              env_file.write("AWS_DEFAULT_REGION=us-east-1\n")
              env_file.write("AWS_REGION=us-east-1\n")
          EOF
        env:
          CLOUD_CREDENTIALS: ${{ secrets.CLOUD_CREDENTIALS }}

      - name: Pull data with DVC
        run: dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc

      - name: Train model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> "$GITHUB_OUTPUT"

      - name: Upload candidate model to Cloud Storage
        run: |
          python - <<'EOF'
          import os
          import boto3

          bucket = os.environ["CLOUD_BUCKET"]
          commit_sha = os.environ["GITHUB_SHA"]
          s3 = boto3.client("s3", region_name="us-east-1")

          model_key = f"models/candidates/{commit_sha}/model.pkl"
          metrics_key = f"models/candidates/{commit_sha}/metrics.json"

          s3.upload_file(
              "models/model.pkl",
              bucket,
              model_key,
          )
          s3.upload_file(
              "outputs/metrics.json",
              bucket,
              metrics_key,
          )
          print(f"Uploaded candidate model to s3://{bucket}/{model_key}")
          print(f"Uploaded candidate metrics to s3://{bucket}/{metrics_key}")
          EOF
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: |
            outputs/metrics.json
            outputs/report.txt


  # ---------------------------------------------------------------------------
  # JOB 3 - EVAL
  # Kiem tra nguong chat luong (accuracy >= 0.68).
  # Pipeline dung lai o day neu mo hinh chua dat yeu cau.
  # Chi chay khi Job 2 (Train) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Cloud Storage
        run: |
          python - <<'EOF'
          import json
          import os

          credentials = json.loads(os.environ["CLOUD_CREDENTIALS"])
          with open(os.environ["GITHUB_ENV"], "a") as env_file:
              env_file.write(f"AWS_ACCESS_KEY_ID={credentials['aws_access_key_id']}\n")
              env_file.write(f"AWS_SECRET_ACCESS_KEY={credentials['aws_secret_access_key']}\n")
              env_file.write("AWS_DEFAULT_REGION=us-east-1\n")
              env_file.write("AWS_REGION=us-east-1\n")
          EOF
        env:
          CLOUD_CREDENTIALS: ${{ secrets.CLOUD_CREDENTIALS }}

      - name: Check eval gate
        run: |
          python - <<'EOF'
          import json
          import os

          import boto3
          from botocore.exceptions import ClientError

          new_acc = float("${{ needs.train.outputs.accuracy }}")
          bucket = os.environ["CLOUD_BUCKET"]
          latest_metrics_key = "models/latest/metrics.json"

          if new_acc < 0.68:
              raise SystemExit(f"FAILED: accuracy {new_acc:.4f} < 0.68. Huy deploy.")

          s3 = boto3.client("s3", region_name="us-east-1")
          try:
              response = s3.get_object(Bucket=bucket, Key=latest_metrics_key)
              previous_metrics = json.loads(response["Body"].read().decode("utf-8"))
              previous_acc = float(previous_metrics["accuracy"])
              print(f"Previous deployed accuracy: {previous_acc:.4f}")
          except ClientError as exc:
              error_code = exc.response.get("Error", {}).get("Code")
              if error_code in {"NoSuchKey", "404"}:
                  previous_acc = None
                  print("No previous deployed metrics found. First deploy is allowed.")
              else:
                  raise

          print(f"Candidate accuracy: {new_acc:.4f}")
          if previous_acc is not None and new_acc < previous_acc:
              raise SystemExit(
                  f"FAILED: candidate accuracy {new_acc:.4f} < "
                  f"previous deployed accuracy {previous_acc:.4f}. Huy deploy."
              )

          print("PASSED: candidate model is eligible for deploy.")
          EOF
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}


  # ---------------------------------------------------------------------------
  # JOB 4 - DEPLOY
  # Trien khai len VM qua SSH.
  # Chi chay khi Job 3 (Eval) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Cloud Storage
        run: |
          python - <<'EOF'
          import json
          import os

          credentials = json.loads(os.environ["CLOUD_CREDENTIALS"])
          with open(os.environ["GITHUB_ENV"], "a") as env_file:
              env_file.write(f"AWS_ACCESS_KEY_ID={credentials['aws_access_key_id']}\n")
              env_file.write(f"AWS_SECRET_ACCESS_KEY={credentials['aws_secret_access_key']}\n")
              env_file.write("AWS_DEFAULT_REGION=us-east-1\n")
              env_file.write("AWS_REGION=us-east-1\n")
          EOF
        env:
          CLOUD_CREDENTIALS: ${{ secrets.CLOUD_CREDENTIALS }}

      - name: Promote candidate model
        run: |
          python - <<'EOF'
          import os

          import boto3

          bucket = os.environ["CLOUD_BUCKET"]
          commit_sha = os.environ["GITHUB_SHA"]
          s3 = boto3.client("s3", region_name="us-east-1")

          promotions = {
              f"models/candidates/{commit_sha}/model.pkl": "models/latest/model.pkl",
              f"models/candidates/{commit_sha}/metrics.json": "models/latest/metrics.json",
          }
          for source_key, dest_key in promotions.items():
              s3.copy_object(
                  Bucket=bucket,
                  CopySource={"Bucket": bucket, "Key": source_key},
                  Key=dest_key,
              )
              print(f"Promoted s3://{bucket}/{source_key} to s3://{bucket}/{dest_key}")
          EOF
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}

      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            sleep 5
            curl -sf http://localhost:8000/health
            echo "Health check passed."
